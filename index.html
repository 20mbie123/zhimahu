<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>é¾čµęø¤é“ęØ»ęŗ</title>
<style>
  :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden; background:#000;
    touch-action:manipulation;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
    font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;

  #wrap { position:relative; width:100%; height:100%; }
  canvas { display:block; }

  #hud {
    position:absolute; top:0; left:0; right:0;
    pointer-events:none; z-index:10;
    display:flex; justify-content:center; gap:12px;
    padding:10px 14px;
  }
  .hud-panel {
    background:rgba(0,0,0,.5); border-radius:8px;
    padding:5px 12px; color:#fff; font-size:13px; font-weight:700;
    backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.15);
    white-space:nowrap;
  }
  .hud-score { color:#ffd740; font-size:16px; }

  #mobile-ctrl {
    display:none; position:absolute; bottom:0; left:0; right:0;
    height:200px; z-index:20; pointer-events:none;
  }
  .dpad {
    position:absolute; left:10px; bottom:calc(10px + var(--safe-bottom));
    width:136px; height:136px;
    display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr;
    gap:3px; pointer-events:auto;
  }
  .dpad button {
    border:none; border-radius:12px;
    background:rgba(255,255,255,.10); color:rgba(255,255,255,.6);
    font-size:20px; display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent; cursor:pointer;
    border:1.5px solid rgba(255,255,255,.16);
  }
  .dpad button:active, .dpad button.on {
    background:rgba(255,220,80,.25); border-color:rgba(255,220,80,.5); color:#ffd740;
  }
  .btn-up{grid-column:2;grid-row:1}
  .btn-left{grid-column:1;grid-row:2}
  .btn-mid{grid-column:2;grid-row:2;background:rgba(255,255,255,.04)!important;border-color:rgba(255,255,255,.05)!important;font-size:9px!important;color:rgba(255,255,255,.15)!important;pointer-events:none}
  .btn-right{grid-column:3;grid-row:2}
  .btn-down{grid-column:2;grid-row:3}

  #overlay {
    position:absolute; top:0;left:0;right:0;bottom:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; z-index:30;
    background:radial-gradient(ellipse at center, rgba(10,10,40,.85), rgba(0,0,0,.95));
  }
  #overlay.off{display:none}
  #overlay h1{
    color:#fff; font-size:clamp(28px,6vw,48px);
    text-shadow:0 0 30px rgba(0,180,255,.7),0 0 60px rgba(0,120,255,.4);
    letter-spacing:2px;
  }
  #overlay .tip{color:#aac;text-align:center;line-height:1.8;font-size:clamp(13px,3vw,15px);max-width:280px}
  #overlay .tip kbd{
    display:inline-block;background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);border-radius:5px;
    padding:3px 8px;margin:0 2px;color:#ffd740;font-weight:700;font-size:12px
  }
  #start-btn{
    padding:13px 48px;font-size:18px;font-weight:700;letter-spacing:1px;
    background:linear-gradient(180deg,#00b8ff,#0060cc);
    color:#fff;border:none;border-radius:28px;cursor:pointer;
    box-shadow:0 0 24px rgba(0,150,255,.5);transition:transform .12s;
    -webkit-tap-highlight-color:transparent;
  }
  #start-btn:active{transform:scale(.94)}

  @media(max-width:768px){ #mobile-ctrl{display:block} }
</style>
</head>

  <div id="overlay">
    <h1>é¦åÆ£ é¾čµęø¤é“ęØ»ęŗ</h1>
    <p class="tip">
      éē°ęéæ?<kbd>é«ęåé«ęØå</kbd> é“?<kbd>W A S D</kbd> ē»čÆ²å§©<br>
      <span style="color:#ffd740;">éæ?é·īå§©åÆ®ā¬éī¬ē“éē»ęø¶ę£°ęæī»éæå¶ē¶</span>
    </p>
    <p class="tip" style="font-size:11px;color:#667;">
      ē»čÆ²å§©ē»īåéć¦ęØē»éøæę«é·ēøęé?    </p>
    <button id="start-btn">éå©āęµ£ę»å¬</button>

<script>
// ==================== DOM ====================
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const overlay  = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const scoreUI  = document.getElementById('score-ui');
const waveUI   = document.getElementById('wave-ui');
const lifeUI   = document.getElementById('life-ui');
const dpadEl   = document.getElementById('dpad');

// ==================== éę°­å«åØååę¶ę «ę« ====================
const GAME_W = 400;
let scale   = 1;
let gameH   = 700;
let viewX   = 0;
let viewY   = 0;
let viewW   = 0;
let viewH   = 0;

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const dpr = 1;
  canvas.width  = w;
  canvas.height = h;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';

  const byW = w / GAME_W;
  const byH = h / (GAME_W * 1.7);
  scale = Math.min(byW, byH);
  if (scale < 0.55) scale = 0.55;

  viewW = Math.floor(GAME_W * scale);
  viewH = h;
  gameH = viewH / scale;
  viewX = Math.floor((w - viewW) / 2);
  viewY = 0;
}
window.addEventListener('resize', resize);
resize();

// ==================== éč«ę„ ====================
let actx = null;
function audioCtx() {
  if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  return actx;
}
function sfx(f, type, dur, vol=.10, slide=0) {
  try {
    const a = audioCtx();
    if (a.state==='suspended') a.resume();
    const t = a.currentTime;
    const o = a.createOscillator();
    const g = a.createGain();
    o.type=type; o.frequency.setValueAtTime(f,t);
    if (slide) o.frequency.linearRampToValueAtTime(f+slide,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+dur);
  } catch(e){}
}
const S = {
  shoot: ()=>sfx(700,'square',.05,.05,-250),
  hit:   ()=>sfx(130,'sawtooth',.08,.07),
  explode:()=>{sfx(45,'sawtooth',.16,.12);sfx(220,'square',.06,.05,-100);},
  damage: ()=>sfx(55,'sawtooth',.2,.14),
  wave:  ()=>{sfx(520,'triangle',.1,.1,-200);sfx(720,'triangle',.1,.1,-300);},
};

// ==================== åØååéčµā¬?====================
const state = {
  running: false,
  score:0, wave:1, lives:3,
  invTimer:0, combo:0, comboTimer:0,
  shakeTimer:0, shakeMag:0,
};

// ==================== éāī ====================
const player = {
  x:0, y:0,
  w:40, h:48,
  speed: 320,
  fireCD:0, fireRate:0.13,
  engineT:0,
};

// ==================== éēåµ ====================
let bullets   = [];
let eBullets  = [];
let enemies   = [];
let particles = [];
let stars     = [];
let spawnTimer=0, spawnQty=0;

// ==================== ęę³å ====================
const keys = { up:false, down:false, left:false, right:false };

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k==='arrowup'   ||k==='w') keys.up    = true;
  if (k==='arrowdown' ||k==='s') keys.down  = true;
  if (k==='arrowleft' ||k==='a') keys.left  = true;
  if (k==='arrowright'||k==='d') keys.right = true;
  if (e.code==='Space') e.preventDefault();
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k==='arrowup'   ||k==='w') keys.up    = false;
  if (k==='arrowdown' ||k==='s') keys.down  = false;
  if (k==='arrowleft' ||k==='a') keys.left  = false;
  if (k==='arrowright'||k==='d') keys.right = false;
});

if (dpadEl) {
  dpadEl.querySelectorAll('button[data-dir]').forEach(btn => {
    const d = btn.dataset.dir;
    ['pointerdown','pointerup','pointerleave','pointercancel'].forEach(ev => {
      btn.addEventListener(ev, e => {
        e.preventDefault();
        keys[d] = (ev==='pointerdown');
        btn.classList.toggle('on', ev==='pointerdown');
      });
    });
  });
}

// ==================== éēŗā ====================
function initStars() {
  stars = [];
  for (let i=0;i<80;i++) {
    stars.push({
      x: Math.random()*GAME_W,
      y: Math.random()*gameH,
      r: Math.random()*1.5+0.4,
      speed: Math.random()*0.6+0.2,
      alpha: Math.random()*0.55+0.35,
    });
  }
}

// ==================== éå±¼ę± ====================
const ENEMY_DEFS = {
  basic:  { hp:1, speed:150, w:36, h:36, color:'#ff5252', glow:'#ff1744', score:100, shoot:false },
  fast:   { hp:1, speed:300, w:28, h:28, color:'#ffd740', glow:'#ffab00', score:150, shoot:false },
  tank:   { hp:3, speed:85,  w:48, h:48, color:'#e040fb', glow:'#aa00ff', score:300, shoot:true  },
  shooter:{ hp:2, speed:115, w:38, h:38, color:'#ff6e40', glow:'#dd2c00', score:200, shoot:true  },
};

function spawnEnemy(type='basic') {
  const d = ENEMY_DEFS[type] || ENEMY_DEFS.basic;
  const bonusHp = Math.floor((state.wave-1)/3);
  return {
    x: 25 + Math.random()*(GAME_W-50),
    y: -50 - Math.random()*130,
    ...d, type,
    hp: d.hp + bonusHp,
    maxHp: d.hp + bonusHp,
    shootCD: Math.random()*1.5+0.3,
    timer:0,
    pattern: Math.random()<.25?'zigzag':'straight',
    zigDir: Math.random()<.5?1:-1,
    alive:true,
  };
}

function spawnWave(w) {
  spawnQty = 5 + w*3;
  spawnTimer = 0;
  state.wave = w;
  waveUI.textContent = `ē»?${w} åØī;
  S.wave();

  if (w%5===0) {
    const boss = spawnEnemy('tank');
    boss.hp = 10 + w*2;
    boss.maxHp = boss.hp;
    boss.w = 85; boss.h = 85;
    boss.speed = 55;
    boss.x = GAME_W/2;
    boss.y = -90;
    enemies.push(boss);
  }
}

// ==================== ē»®ęē ====================
function emit(x, y, color, n=10) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*120+40;
    particles.push({
      x,y,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:.4+Math.random()*.5, age:0,
      color, r:Math.random()*2.5+1.5,
    });
  }
}

// ==================== ēŗ°ēę ====================
function rectHit(a,b) {
  return (
    a.x-a.w/2 < b.x+b.w/2 && a.x+a.w/2 > b.x-b.w/2 &&
    a.y-a.h/2 < b.y+b.h/2 && a.y+a.h/2 > b.y-b.h/2
  );
}

// ==================== ē¼ęØŗåéč„ę ====================
function drawPlayer() {
  const {x,y,w,h,engineT} = player;
  ctx.save(); ctx.translate(x,y);

  const ef = Math.sin(engineT*18)*3+7;
  ctx.save(); ctx.translate(0, h/2-3);
  const g1=ctx.createLinearGradient(0,0,0,ef+10);
  g1.addColorStop(0,'#ffaa00');g1.addColorStop(.4,'#ff4400');g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1;
  ctx.beginPath();ctx.moveTo(-9,0);ctx.lineTo(0,ef+10);ctx.lineTo(9,0);ctx.closePath();ctx.fill();
  const g2=ctx.createLinearGradient(0,0,0,ef+3);
  g2.addColorStop(0,'#fff');g2.addColorStop(.3,'#ffcc00');g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2;
  ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(0,ef+3);ctx.lineTo(5,0);ctx.closePath();ctx.fill();
  ctx.restore();

  const gl=ctx.createRadialGradient(0,0,w*.2,0,0,w*.85);
  gl.addColorStop(0,'rgba(0,200,255,.3)');gl.addColorStop(1,'transparent');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(0,0,w*.85,0,Math.PI*2);ctx.fill();

  const bg=ctx.createLinearGradient(0,-h/2,0,h/2);
  bg.addColorStop(0,'#4dd0e1');bg.addColorStop(.5,'#0288d1');bg.addColorStop(1,'#01579b');
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(0,-h/2);ctx.lineTo(w/2,h/3);ctx.lineTo(w/4,h/2);ctx.lineTo(-w/4,h/2);ctx.lineTo(-w/2,h/3);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.stroke();

  const cg=ctx.createLinearGradient(0,-9,0,9);
  cg.addColorStop(0,'#fff');cg.addColorStop(1,'#80deea');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.ellipse(0,-3,8,11,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1;ctx.stroke();

  ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(-w/2+4,h/3-2);ctx.lineTo(-8,h/2-4);
  ctx.moveTo(w/2-4,h/3-2);ctx.lineTo(8,h/2-4);
  ctx.stroke();

  ctx.restore();
}

function drawEnemy(e) {
  const {x,y,w,h,color,glow,type,hp,maxHp} = e;
  ctx.save();ctx.translate(x,y);

  ctx.globalAlpha=.25;ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(0,0,w*.75,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

  ctx.fillStyle=color;ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=2;
  ctx.beginPath();
  if (type==='tank'&&maxHp>5) {
    for (let i=0;i<6;i++) {
      const a=Math.PI/3*i-Math.PI/2;
      const px=Math.cos(a)*w/2, py=Math.sin(a)*h/2;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
  } else {
    ctx.moveTo(0,-h/2);ctx.lineTo(w/2,0);ctx.lineTo(0,h/2);ctx.lineTo(-w/2,0);
  }
  ctx.closePath();ctx.fill();ctx.stroke();

  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,w*.2,0,Math.PI*2);ctx.fill();

  if (maxHp>2) {
    const bw=w*1.1, bh=5;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-bw/2,h/2+8,bw,bh);
    ctx.fillStyle='#ff5252';ctx.fillRect(-bw/2,h/2+8,bw*(hp/maxHp),bh);
  }
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  const t=ctx.createLinearGradient(b.x,b.y,b.x,b.y-16);
  t.addColorStop(0,'rgba(255,255,200,.9)');t.addColorStop(.5,'rgba(255,200,0,.5)');t.addColorStop(1,'transparent');
  ctx.fillStyle=t;ctx.fillRect(b.x-3,b.y-8,6,20);
  ctx.fillStyle='#fff';ctx.shadowColor='#ffaa00';ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawEBullet(b) {
  ctx.save();
  ctx.fillStyle='#ff5252';ctx.shadowColor='#f00';ctx.shadowBlur=6;
  ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  const a=1-p.age/p.life;
  ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.color;
  ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawStars() {
  stars.forEach(s=>{
    ctx.save();ctx.globalAlpha=s.alpha;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

// ==================== éå­ęé«ęē·« ====================
function update(dt) {
  if (!state.running) return;
  if (state.invTimer>0)   state.invTimer-=dt;
  if (state.comboTimer>0) state.comboTimer-=dt; else state.combo=0;
  if (state.shakeTimer>0) state.shakeTimer-=dt;

  let mx=0, my=0;
  if (keys.up)    my-=1;
  if (keys.down)  my+=1;
  if (keys.left)  mx-=1;
  if (keys.right) mx+=1;
  if (mx!==0||my!==0) { const l=Math.sqrt(mx*mx+my*my); mx/=l; my/=l; }
  player.x += mx*player.speed*dt;
  player.y += my*player.speed*dt;
  player.x = Math.max(player.w/2, Math.min(GAME_W-player.w/2, player.x));
  player.y = Math.max(player.h/2, Math.min(gameH-player.h/2, player.y));
  player.engineT += dt;

  player.fireCD -= dt;
  if (player.fireCD<=0) {
    player.fireCD = player.fireRate;
    bullets.push({ x:player.x, y:player.y-player.h/2, vy:-850, alive:true });
    S.shoot();
  }

  for (const b of bullets) b.y += b.vy*dt;
  bullets = bullets.filter(b=>b.y>-20);
  for (const b of eBullets) { b.y+=b.vy*dt; b.x+=(b.vx||0)*dt; }
  eBullets = eBullets.filter(b=>b.y<gameH+20&&b.y>-20&&b.x>-20&&b.x<GAME_W+20);

  for (const e of enemies) {
    if (!e.alive) continue;
    e.timer+=dt; e.shootCD-=dt;
    e.y += e.speed*dt;
    if (e.pattern==='zigzag') e.x += Math.sin(e.timer*3)*e.speed*0.8*dt*e.zigDir;
    if (e.y>gameH+60&&e.y>0) { e.alive=false; state.combo=0; }

    if (e.shoot&&e.shootCD<=0&&e.y>0&&e.y<gameH) {
      e.shootCD = Math.max(.32, 2.0-state.wave*.07);
      const dx=player.x-e.x, dy=player.y-e.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const spd=380;
      eBullets.push({ x:e.x, y:e.y+e.h/2, vx:(dx/dist)*spd, vy:(dy/dist)*spd, alive:true });
    }
  }

  for (const b of bullets) {
    if (!b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectHit({x:b.x,y:b.y,w:6,h:14},{x:e.x,y:e.y,w:e.w,h:e.h})) {
        b.alive=false; e.hp--; S.hit(); emit(b.x,b.y,'#ffaa00',3);
        if (e.hp<=0) {
          e.alive=false; state.score+=e.score;
          state.combo++; state.comboTimer=1.5;
          state.shakeTimer=.12; state.shakeMag=2+state.combo*.5;
          S.explode(); emit(e.x,e.y,e.color,16);
          scoreUI.textContent = state.combo>=5 ? state.score+` (x${state.combo})` : state.score;
          scoreUI.style.color = state.combo>=5 ? '#ff5252' : '#ffd740';
        }
        break;
      }
    }
  }
  bullets = bullets.filter(b=>b.alive);

  if (state.invTimer<=0) {
    for (const b of eBullets) {
      if (!b.alive) continue;
      if (rectHit({x:b.x,y:b.y,w:8,h:8},{x:player.x,y:player.y,w:player.w*.65,h:player.h*.65})) {
        b.alive=false; hitPlayer(); break;
      }
    }
  }
  eBullets = eBullets.filter(b=>b.alive);

  if (state.invTimer<=0) {
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectHit({x:player.x,y:player.y,w:player.w*.55,h:player.h*.55},{x:e.x,y:e.y,w:e.w*.7,h:e.h*.7})) {
        e.alive=false; emit(e.x,e.y,e.color,12); S.explode(); hitPlayer(); break;
      }
    }
  }
  enemies = enemies.filter(e=>e.alive);

  for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.age+=dt; }
  particles = particles.filter(p=>p.age<p.life);

  for (const s of stars) { s.y+=s.speed*dt*35; if (s.y>gameH+5){s.y=-5;s.x=Math.random()*GAME_W;} }

  if (spawnQty>0) {
    spawnTimer-=dt;
    if (spawnTimer<=0) {
      spawnTimer = Math.max(.18, 1.7-state.wave*.09);
      spawnQty--;
      const r=Math.random(), w=state.wave;
      let type='basic';
      if (w>=4&&r<.15) type='tank';
      else if (w>=2&&r<.30) type='shooter';
      else if (w>=3&&r<.50) type='fast';
      enemies.push(spawnEnemy(type));
    }
  }

  if (spawnQty<=0&&enemies.length===0) { state.wave++; spawnWave(state.wave); }
}

function hitPlayer() {
  state.lives--; state.invTimer=2; state.shakeTimer=.25; state.shakeMag=10; state.combo=0;
  S.damage(); lifeUI.textContent='éćē¬ x'+Math.max(0,state.lives);
  emit(player.x,player.y,'#00e5ff',20);
  if (state.lives<=0) gameOver();
}

function gameOver() {
  state.running=false;
  overlay.classList.remove('off');
  overlay.querySelector('h1').textContent='é¦ę é§ē³ē';
  overlay.querySelector('.tip').innerHTML=`
    éā¬ē¼å ē·±é? <span style="color:#ffd740;font-size:22px;">${state.score}</span><br>
    éęęŖē»?<span style="color:#ff9800;">${state.wave}</span> åØ?  `;
  startBtn.textContent='éå¶ī¼éå©ā';
}

// ==================== åØåē ====================
function render() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#060612';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.setTransform(scale,0,0,scale,viewX,viewY);

  let sx=0,sy=0;
  if (state.shakeTimer>0) {
    const m=state.shakeMag*(state.shakeTimer/.25);
    sx=(Math.random()-.5)*m*2; sy=(Math.random()-.5)*m*2;
  }
  ctx.translate(sx,sy);

  ctx.fillStyle='#08081c';
  ctx.fillRect(0,0,GAME_W,gameH);

  drawStars();
  eBullets.forEach(drawEBullet);
  enemies.forEach(e=>{if(e.alive)drawEnemy(e);});
  bullets.forEach(drawBullet);
  if (state.invTimer<=0||Math.floor(state.invTimer*10)%2===0) drawPlayer();
  particles.forEach(drawParticle);

  ctx.setTransform(1,0,0,1,0,0);
  if (viewX>0) { ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(0,0,viewX,canvas.height); }
  const re = viewX+viewW;
  if (re<canvas.width) { ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(re,0,canvas.width-re,canvas.height); }
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1;
  ctx.strokeRect(viewX,viewY,viewW,canvas.height);
}

// ==================== ę¶čÆ²ęé?====================
let lastT=0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.1); lastT=ts;
  if (state.running) { resize(); update(dt); render(); }
  else {
    ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle='#060612'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(scale,0,0,scale,viewX,viewY);
    ctx.fillStyle='#08081c'; ctx.fillRect(0,0,GAME_W,gameH);
    for (const s of stars){s.y+=s.speed*dt*25;if(s.y>gameH+5){s.y=-5;s.x=Math.random()*GAME_W;}}
    drawStars();
    ctx.setTransform(1,0,0,1,0,0);
    if (viewX>0){ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,0,viewX,canvas.height);}
  }
}

// ==================== é²å¶ē ====================
function reset() {
  resize();
  player.x = GAME_W/2;
  player.y = gameH*.78;
  player.fireCD=0; player.engineT=0;

  bullets=[]; eBullets=[]; enemies=[]; particles=[]; spawnQty=0; spawnTimer=0;

  state.score=0; state.wave=1; state.lives=3;
  state.invTimer=.5; state.combo=0; state.comboTimer=0; state.shakeTimer=0; state.shakeMag=0;
  state.running=true;

  scoreUI.textContent='0'; scoreUI.style.color='#ffd740';
  waveUI.textContent='ē»?1 åØ?; lifeUI.textContent='éćē¬ x3';

  initStars(); spawnWave(1);
  overlay.classList.add('off');
}

startBtn.addEventListener('click', reset);
initStars();
requestAnimationFrame(loop);
</script>
